name: Parallel Merge Orchestrator (Manual Merge)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Analyze PR for merge readiness
        id: analysis
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Validações
            const hasValidTitle = /^V\d+\.\d+\.\d+(-WIP)? - /.test(pr.title);
            const hasGoodBody = pr.body && pr.body.length > 150 && pr.body.includes('##');
            const isDraft = pr.draft;
            const hasReviews = pr.requested_reviewers && pr.requested_reviewers.length > 0;
            
            core.setOutput('valid_title', hasValidTitle);
            core.setOutput('good_body', hasGoodBody);
            core.setOutput('is_draft', isDraft);
            core.setOutput('has_reviews', hasReviews);
      
      - name: Check if merge-ready
        id: merge_readiness
        run: |
          # Status checks disponíveis
          has_title=${{ steps.analysis.outputs.valid_title }}
          has_body=${{ steps.analysis.outputs.good_body }}
          is_draft=${{ steps.analysis.outputs.is_draft }}
          
          if [ "$has_title" = "true" ] && [ "$has_body" = "true" ] && [ "$is_draft" = "false" ]; then
            echo "merge_ready=true" >> $GITHUB_OUTPUT
          else
            echo "merge_ready=false" >> $GITHUB_OUTPUT
          fi
      
      - name: List merge queue (dependency order)
        id: queue
        uses: actions/github-script@v7
        with:
          script: |
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: context.payload.pull_request.base.ref,
              sort: 'created',
              direction: 'asc',
              per_page: 50
            });
            
            // Filtra PRs com labels críticas
            const criticalPRs = prs.data.filter(pr => 
              pr.labels.some(l => l.name === 'critical-path' || l.name === 'merge-first')
            );
            
            const normalPRs = prs.data.filter(pr =>
              !pr.labels.some(l => l.name === 'critical-path' || l.name === 'merge-first')
            );
            
            // Ordena: críticas primeiro
            const queue = [...criticalPRs, ...normalPRs]
              .slice(0, 10)
              .map((pr, idx) => `${idx + 1}. #${pr.number} (${pr.title.substring(0, 50)}...)`)
              .join('\n');
            
            core.setOutput('queue', queue || 'Sem PRs na fila');
            core.setOutput('queue_size', prs.data.length);
      
      - name: Comment merge guidance
        if: steps.merge_readiness.outputs.merge_ready == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Parallel Merge Orchestrator - Pronto para Merge**\n\n**Status da PR:**\n- ✅ Título válido\n- ✅ Descrição completa\n- ✅ Não é Draft\n- ✅ Pronta para merge\n\n**📋 Fila de merge atual:**\n${{ steps.queue.outputs.queue }}\n\n**🔄 Instruções para merge manual:**\n1. Verifique se todos os status checks passaram (green)\n2. Clique em "Squash and merge" ou "Merge pull request"\n3. Mantenha o título: \`${{ github.event.pull_request.title }}\`\n4. A próxima PR será notificada automaticamente\n\n**Total de PRs aguardando:** ${{ steps.queue.outputs.queue_size }}`
            })
      
      - name: Comment merge blockers
        if: steps.merge_readiness.outputs.merge_ready == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = [];
            if ('${{ steps.analysis.outputs.valid_title }}' !== 'true') issues.push('❌ Título não segue padrão');
            if ('${{ steps.analysis.outputs.good_body }}' !== 'true') issues.push('❌ Descrição incompleta');
            if ('${{ steps.analysis.outputs.is_draft }}' === 'true') issues.push('❌ PR ainda é Draft');
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⚠️ **Parallel Merge Orchestrator - Merge Bloqueado**\n\n**Problemas encontrados:**\n${issues.map(i => '- ' + i).join('\n')}\n\n**Ações necessárias:**\n1. Corrija os problemas acima\n2. Faça push das mudanças\n3. Aguarde a validação passar novamente`
            })
      
      - name: Notify dependent modules (if critical)
        if: contains(github.event.pull_request.labels.*.name, 'critical-path')
        uses: actions/github-script@v7
        with:
          script: |
            core.info('📢 Esta é uma PR crítica. Módulos dependentes serão notificados após o merge.');
      
      - name: Success
        run: |
          echo "✅ Parallel Merge Orchestrator executado com sucesso"
          echo "📋 Este workflow apenas notifica sobre merge readiness"

