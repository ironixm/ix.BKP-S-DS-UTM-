name: Validate Commit Format

on:
  workflow_run:
    workflows: ["ix.PR-Auto-Fill-V1.1"]
    types: [completed]

jobs:
  validate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Load PR metadata
        id: pr
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          event = json.load(open(os.environ["GITHUB_EVENT_PATH"]))
          prs = event.get("workflow_run", {}).get("pull_requests", [])
          if not prs:
              raise SystemExit("No PR context found for workflow_run.")
          pr = prs[0]
          print(f"head_sha={pr['head']['sha']}")
          print(f"base_sha={pr['base']['sha']}")
          print(f"pr_number={pr['number']}")
          print(f"title={pr['title']}")
          PY
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr.outputs.head_sha }}
      - name: Validate PR title
        run: |
          title="${{ steps.pr.outputs.title }}"
          # Suporta padrão normal E padrão WIP
          pattern='^V[0-9]+\.[0-9]+\.[0-9]+(-WIP)? - [A-Za-z0-9][A-Za-z0-9-]*(\|[A-Za-z0-9][A-Za-z0-9-]*)? - .+ - (FEAT|FIX|DOCS|REFACTOR|TEST|CHORE|WIP) - [0-9]{10}( \(#[0-9]+\))?$'
          if ! [[ "$title" =~ $pattern ]]; then
            echo "❌ PR title fora do padrão."
            echo "✅ Esperado: Vx.y.z - ModuloX|ModuloY - Titulo - TIPO - YYMMDDHHMM"
            echo "✅ Ou (WIP): Vx.y.z-WIP - ModuloX - Titulo - WIP - YYMMDDHHMM"
            echo "❌ Recebido: $title"
            exit 1
          fi
      - name: Validate commits in PR
        run: |
          base="${{ steps.pr.outputs.base_sha }}"
          head="${{ steps.pr.outputs.head_sha }}"
          pattern='^V[0-9]+\.[0-9]+\.[0-9]+(-WIP)? - [A-Za-z0-9][A-Za-z0-9-]*(\|[A-Za-z0-9][A-Za-z0-9-]*)? - .+ - (FEAT|FIX|DOCS|REFACTOR|TEST|CHORE|WIP) - [0-9]{10}( \(#[0-9]+\))?$'
          wip_count=0
          while read -r line; do
            if ! [[ "$line" =~ $pattern ]]; then
              echo "❌ Commit inválido: $line"
              exit 1
            fi
            if [[ "$line" =~ -WIP ]]; then
              ((wip_count++))
            fi
          done < <(git log --format=%s --no-merges "$base..$head")
          
          # Avisar se há commits WIP (sugerir squash)
          if [ $wip_count -gt 0 ]; then
            echo "⚠️  ATENÇÃO: Encontrados $wip_count commits WIP na PR."
            echo "💡 Sugestão: Faça squash dos commits WIP antes de mergear."
            echo "   git rebase -i develop # Escolha 'squash' para commits WIP"
          fi
