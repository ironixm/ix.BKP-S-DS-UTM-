name: Migration Safety Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "models/**"
      - "migrations/**"

jobs:
  check_migration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -q -r requirements.txt
      
      - name: Detect model changes
        id: models
        run: |
          base_ref="${{ github.base_ref }}"
          head_ref="${{ github.head_ref }}"
          
          # Check if models/ ou migrations/ foram modificados
          if git diff --name-only origin/$base_ref...HEAD | grep -qE "^(models/|migrations/)"; then
            echo "models_changed=true" >> $GITHUB_OUTPUT
            echo "✅ Modelos ou migrations foram modificados"
          else
            echo "models_changed=false" >> $GITHUB_OUTPUT
            echo "⏭️  Sem mudanças em models/ ou migrations/"
            echo "✅ Check passou - nada para validar"
            exit 0
          fi
      
      - name: Check migration exists
        if: steps.models.outputs.models_changed == 'true'
        run: |
          # Verifica se há novo arquivo de migration
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^migrations/versions/"; then
            echo "✅ Migration foi criada"
            exit 0
          else
            echo "❌ ERRO: Models foram modificados mas nenhuma migration foi criada!"
            echo "   Crie com: flask db migrate -m 'descrição'"
            exit 1
          fi
      
      - name: Setup PostgreSQL
        uses: ankane/setup-postgres@v1
        with:
          postgres-version: 15
      
      - name: Test migrations (upgrade)
        if: steps.models.outputs.models_changed == 'true'
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/test_db
          SQLALCHEMY_DATABASE_URI: postgres://postgres:postgres@localhost/test_db
          FLASK_APP: wsgi:application
          APP_LITE_MODE: 1
        run: |
          export FLASK_APP=wsgi:application
          flask db upgrade head 2>&1 | head -20
          echo "✅ Migrations upgrade OK"
      
      - name: Test migrations (downgrade)
        if: steps.models.outputs.models_changed == 'true'
        continue-on-error: true
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost/test_db
          SQLALCHEMY_DATABASE_URI: postgres://postgres:postgres@localhost/test_db
          FLASK_APP: wsgi:application
          APP_LITE_MODE: 1
        run: |
          export FLASK_APP=wsgi:application
          flask db downgrade -1 2>&1 | head -20
          echo "✅ Migrations downgrade OK"
          flask db upgrade head
      
      - name: Comment on PR
        if: failure() && steps.models.outputs.models_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Migration Safety Check Falhou**\n\n- Models foram modificados\n- Migration pode ter problemas na reversão\n- Execute localmente: \`flask db upgrade head && flask db downgrade -1\`\n- Corrija e faça push novamente`
            })
