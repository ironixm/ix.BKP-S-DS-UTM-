name: Validate Commit Format

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  commit-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate PR title
        run: |
          title="${{ github.event.pull_request.title }}"
          # Suporta padrão normal E padrão WIP
          pattern='^V[0-9]+\.[0-9]+\.[0-9]+(-WIP)? - [A-Za-z0-9][A-Za-z0-9-]*(\|[A-Za-z0-9][A-Za-z0-9-]*)? - .+ - (FEAT|FIX|DOCS|REFACTOR|TEST|CHORE|WIP) - [0-9]{10}( \(#[0-9]+\))?$'
          if ! [[ "$title" =~ $pattern ]]; then
            echo "❌ PR title fora do padrão."
            echo "✅ Esperado: Vx.y.z - ModuloX|ModuloY - Titulo - TIPO - YYMMDDHHMM"
            echo "✅ Ou (WIP): Vx.y.z-WIP - ModuloX - Titulo - WIP - YYMMDDHHMM"
            echo "❌ Recebido: $title"
            exit 1
          fi
      - name: Validate commits in PR
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          pattern='^V[0-9]+\.[0-9]+\.[0-9]+(-WIP)? - [A-Za-z0-9][A-Za-z0-9-]*(\|[A-Za-z0-9][A-Za-z0-9-]*)? - .+ - (FEAT|FIX|DOCS|REFACTOR|TEST|CHORE|WIP) - [0-9]{10}( \(#[0-9]+\))?$'
          wip_count=0
          while read -r line; do
            if ! [[ "$line" =~ $pattern ]]; then
              echo "❌ Commit inválido: $line"
              exit 1
            fi
            if [[ "$line" =~ -WIP ]]; then
              ((wip_count++))
            fi
          done < <(git log --format=%s --no-merges "$base..$head")
          
          # Avisar se há commits WIP (sugerir squash)
          if [ $wip_count -gt 0 ]; then
            echo "⚠️  ATENÇÃO: Encontrados $wip_count commits WIP na PR."
            echo "💡 Sugestão: Faça squash dos commits WIP antes de mergear."
            echo "   git rebase -i develop # Escolha 'squash' para commits WIP"
          fi

